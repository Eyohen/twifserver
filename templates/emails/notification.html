<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
</head>
<body style="margin:0;padding:0;background:#f4f6f8;font-family:Arial,sans-serif;color:#111827;">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background:#f4f6f8;padding:32px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="max-width:560px;background:#ffffff;border-radius:18px;overflow:hidden;border:1px solid #e5e7eb;">
          <tr>
            <td style="padding:28px 28px 18px;border-bottom:1px solid #eef2f7;">
              <div style="font-size:18px;font-weight:800;letter-spacing:0.08em;color:#0f172a;">{{appName}}</div>
              <div style="font-size:13px;color:#64748b;margin-top:6px;">{{appTagline}}</div>
            </td>
          </tr>
          <tr>
            <td style="padding:30px 28px;">
              <h1 style="margin:0 0 12px;font-size:22px;line-height:1.3;color:#111827;">{{title}}</h1>
              <p style="margin:0 0 24px;font-size:15px;line-height:1.7;color:#4b5563;">{{message}}</p>
              <a href="{{actionUrl}}" style="display:inline-block;background:#0f766e;color:#ffffff;text-decoration:none;font-weight:700;font-size:14px;padding:12px 18px;border-radius:10px;">{{ctaLabel}}</a>
            </td>
          </tr>
          <tr>
            <td style="padding:18px 28px;background:#f8fafc;color:#94a3b8;font-size:12px;line-height:1.6;">
              You received this because an action related to your Twif account needs your attention.
              <br>
              &copy; {{currentYear}} {{appName}}. All rights reserved.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
